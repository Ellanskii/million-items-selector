services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      # Origin allowed for CORS — set to the frontend's public URL in Coolify env vars
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-*}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - app

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        # Baked into the static bundle at build time.
        # Set API_BASE_URL in Coolify's environment variables before deploying.
        API_BASE_URL: ${API_BASE_URL:-http://localhost:3001}
    restart: unless-stopped
    networks:
      - app

networks:
  app:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1420
