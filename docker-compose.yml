services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      # Origin allowed for CORS — set to the frontend's public URL in Coolify env vars
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-*}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - app

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # Public URL of the backend — set this in Coolify's environment variables.
      # The browser uses this to make API calls directly.
      NUXT_PUBLIC_API_BASE: ${API_BASE_URL:-http://localhost:3001}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app

networks:
  app:
    driver: bridge
